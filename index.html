<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Answer-Based SEO Article Planner</title>
  <meta name="description" content="Turn a search question into a structured SEO article brief with H1, H2s, audience, angle, examples, and checklist items." />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f9fb;
      color: #172033;
      margin: 0;
      padding: 0;
      line-height: 1.6;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .hero {
      background: linear-gradient(135deg, #e8f4ff, #e7fffb);
      padding: 40px;
      border-radius: 24px;
      margin-bottom: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    }

    h1 {
      font-size: 42px;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    h2 {
      margin-top: 34px;
      font-size: 26px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 18px;
      margin-bottom: 6px;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #d3dde8;
      border-radius: 12px;
      font-size: 16px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button {
      margin-top: 22px;
      padding: 14px 22px;
      border: none;
      border-radius: 12px;
      background: #1570ef;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #0f5fc8;
    }

    .output {
      background: white;
      border: 1px solid #dce6ef;
      border-radius: 18px;
      padding: 24px;
      margin-top: 28px;
      white-space: pre-wrap;
      box-shadow: 0 8px 24px rgba(0,0,0,0.05);
    }

    .note {
      font-size: 14px;
      color: #516070;
    }
  </style>
</head>

<body>
  <main class="container">
    <section class="hero">
      <h1>Answer-Based SEO Article Planner</h1>
      <p>Turn a search question into a structured, helpful, non-generic article brief.</p>
      <p class="note">Use this tool before writing a blog post in ChatGPT, Google Docs, or any writing app.</p>
    </section>

    <section>
      <h2>Create Your Article Brief</h2>

      <label for="question">Article question</label>
      <input id="question" placeholder="Example: How to find accurate B2B contact information for cold outreach" />

      <label for="audience">Main audience</label>
      <textarea id="audience" placeholder="Example: SaaS founders, sales reps, lead gen specialists, small business owners, and B2B marketers"></textarea>

      <label for="angle">Article angle</label>
      <textarea id="angle" placeholder="Example: Accuracy matters more than volume. Build a clean test list before scaling outreach."></textarea>

      <label for="opinion">Strong opinion</label>
      <textarea id="opinion" placeholder="Example: Most teams fail because they buy static lead lists."></textarea>

      <label for="workflow">Recommended workflow</label>
      <textarea id="workflow" placeholder="Example: Choose target industry and location, collect NAP and websites, find decision-makers, verify emails, clean records, segment the list, prepare outreach."></textarea>

      <label for="example">Example or case scenario</label>
      <textarea id="example" placeholder="Example: A SaaS founder targeting dental clinics in Austin, Texas."></textarea>

      <label for="cta">Call to action</label>
      <textarea id="cta" placeholder="Example: Try Targetron, verify an existing list, build a small test list first, and compare data sources before scaling."></textarea>

      <button onclick="generateBrief()">Generate Article Brief Prompt</button>

      <div id="output" class="output">Your article brief prompt will appear here.</div>

      <button onclick="copyBrief()">Copy Prompt</button>
    </section>
  </main>

  <script>
    function getValue(id) {
      return document.getElementById(id).value.trim();
    }

    function generateBrief() {
      const question = getValue("question");
      const audience = getValue("audience");
      const angle = getValue("angle");
      const opinion = getValue("opinion");
      const workflow = getValue("workflow");
      const example = getValue("example");
      const cta = getValue("cta");

      const prompt = `I’m writing a blog post answering this question: "${question}"

Please create an initial review draft using the following information:

Audience:
${audience}

Article angle:
${angle}

Strong opinion:
${opinion}

Recommended workflow:
${workflow}

Example or case scenario:
${example}

Call to action:
${cta}

Please follow these rules:
- Use the main keyword from the question in the H1 and first H2.
- Make the first H2 answer the question directly.
- Use related search terms naturally in the remaining H2s.
- Use only 5–6 H2s, including the introduction and conclusion.
- Avoid vague headings like "Final Thoughts."
- Avoid generic AI-style introductions.
- Add practical examples, checklist sections, comparison tables, and internal link placeholders.
- Write this as an initial review draft, not the final polished article.`;

      document.getElementById("output").textContent = prompt;
    }

    function copyBrief() {
      const output = document.getElementById("output").textContent;
      navigator.clipboard.writeText(output);
      alert("Prompt copied!");
    }
  </script>
</body>
</html>
